<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', sans-serif;
      background: #0A0A0A;
      color: #fff;
      overflow-x: hidden;
    }
    header {
      font-family: norse;
      text-align: center;
      font-size: 32px;
      font-weight: 900;
      padding: 60px 20px 40px;
      background: linear-gradient(to bottom, #1a1a1a, #0A0A0A);
    }
    h1 {
      font-size: 3.5rem;
      color: #E50914;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 1.3rem;
      opacity: 0.8;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      padding: 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      transition: transform 0.4s ease, box-shadow 0.4s;
    }

    .gallery-item:hover {
      transform: scale(1.05);
      box-shadow: 0 20px 40px rgba(229, 9, 20, 0.3);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.1);
    }

    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      padding: 30px 20px 20px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .gallery-item:hover .overlay {
      opacity: 1;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.95);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .lightbox-content {
      max-width: 90%;
      max-height: 90%;
      position: relative;
    }

    .lightbox-content img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 12px;
    }

    .close {
      position: absolute;
      top: -50px;
      right: 20px;
      font-size: 40px;
      cursor: pointer;
      color: #fff;
    }

  </style>
</head>
<body>

  <header>
    <h1>6 wery</h1>
    <p class="subtitle">Moments worth remembering</p>
      <div class="gallery">
  </header>

  <div class="gallery" id="gallery">
    <!-- Picha zitaongezwa hapa na JavaScript -->
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-content">
      <span class="close" onclick="closeLightbox()">×</span>
      <img id="lightbox-image" src="" alt="">
    </div>
  </div>


  <script>
    // Weka picha zako hapa (unaweza kuongeza nyingi)
    const images = [
      "../Picha/kaka.jpeg",
      "../Picha/mibangi.jpeg",
      "../Picha/mwamba1.jpeg",
      "../Picha/mrembo5.jpeg",
      "../Picha/ukuta.jpeg",
      "../Picha/msani.jpeg"
      // Ongeza picha zako mpya hapa kama hii:
      // "https://yourwebsite.com/images/photo7.jpg",
    ];

    const gallery = document.getElementById('gallery');

    images.forEach(src => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.innerHTML = `
        <img src="${src}" alt="Gallery Image" onclick="openLightbox('${src}')">
        <div class="overlay">
          <h3>Beautiful Moment</h3>
        </div>
      `;
      gallery.appendChild(item);
    });

    function openLightbox(src) {
      document.getElementById('lightbox-image').src = src;
      document.getElementById('lightbox').style.display = 'flex';
    }

    function closeLightbox() {
      document.getElementById('lightbox').style.display = 'none';
    }

    // Close lightbox kwa kubonyeza Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape") closeLightbox();
    });
  </script>
</body>
</html>
